  <!-- -------------<Contacto------------ -->
  <div class="space-between-flex-j">
    <div class="bloque-formulario-contacto">
      <div class="titulo-contacto">Contacto</div>
      <div class="center-flex-j">
        <div class="col-9">
          <div class="well well-sm">
            <form class="form-horizontal" method="post">
              <fieldset>
                <div class="form-group">
                  <div class="col-md-12">
                    <div class="contact">
                      <input id="fname" name="name" type="text" placeholder="Nombre" class="form-control">
                    </div>
                  </div>
                </div>
                <div class="form-group">
                  <div class="col-md-12">
                    <div class="contact">
                      <input id="lname" name="name" type="text" placeholder="Alpellido" class="form-control">
                    </div>
                  </div>
                </div>
                <div class="form-group">
                  <div class="col-md-12">
                    <div class="contact">
                      <input type="text" placeholder="Asunto (Ventas-Consultas-Etc)" class="form-control">
                    </div>
                  </div>
                </div>
                <div class="form-group">
                  <div class="col-md-12">
                    <div class="contact">
                      <input id="email" name="email" type="text" placeholder="Email" class="form-control">
                    </div>
                  </div>
                </div>
                <div class="form-group">
                  <div class="col-md-12">
                    <div class="contact">
                      <input id="phone" name="phone" type="text" placeholder="Numero de telefono" class="form-control">
                    </div>
                  </div>
                </div>
                <div class="form-group">
                  <div class="col-md-12">
                    <div class="contact">
                      <textarea class="form-control" id="message" name="message"
                        placeholder="Deje su mensaje, lo atenderemos en 2 dias habiles." rows="7"></textarea>
                    </div>
                  </div>
                </div>
                <div class="form-group">
                  <div class="col-md-12 text-center">
                    <button type="submit" class="btn btn-light" style="margin-top: 15px;">Enviar</button>
                  </div>
                </div>
              </fieldset>
            </form>
          </div>
        </div>
      </div>
    </div>
    <div class="bloque-contacto">
    </div>
  </div>
